name: Benchmark Pipeline

on:
  push:
    paths-ignore:
      - 'web/data/**'
      - 'web/reports/**'
      - 'web/visual/**'
      - 'web/workloads/**'
      - 'web/index.html'
  pull_request:
  workflow_dispatch:
    inputs:
      workload:
        description: "Select which workload to run"
        required: true
        default: test.py
        type: choice
        options:
          - test.py
          - test2.py
          - test3.py

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  benchmark:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          ./setup.sh

      - name: Restore Previous Pages Artifacts
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          echo "Querying GitHub deployments API..."
          
          ARTIFACT_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pages/deployments" \
            | grep -m 1 "artifact_url" | cut -d'"' -f4)
          
          if [ ! -z "$ARTIFACT_URL" ]; then
            echo "Downloading live historical web artifacts..."
            curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -o latest_pages.tar.gz "$ARTIFACT_URL"
            
            mkdir -p web
            
            tar -xzf latest_pages.tar.gz -C web --strip-components=1 || tar -xzf latest_pages.tar.gz -C web
            
            rm latest_pages.tar.gz
            echo "Historic state recovered successfully."
          else
            echo "No historic deployments discovered. Initializing fresh workspace structure."
            mkdir -p web
          fi

      - name: Run workload benchmark
        run: |
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"

          WORKLOAD="${{ github.event.inputs.workload }}"
          WORKLOAD=${WORKLOAD:-test.py} 

          ./run.sh \
            -m cpu,memory,thread,gpu \
            -it 5 -wit 3 \
            -cmp 10 \
            -rfmt json,md,csv \
            -vfmt table,chart,graph \
            ./workloads/$WORKLOAD

      - name: Commit benchmark results dataset
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add web/data/
          git diff --cached --quiet || git commit -m "Update benchmark results dataset [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Combined Pages Directory
        run: |
          ls -R web

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: benchmark
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4