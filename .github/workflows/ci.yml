name: Benchmark Pipeline

on:
  push:
    paths-ignore:
      - 'web/data/**'
      - 'web/reports/**'
      - 'web/visual/**'
      - 'web/workloads/**'
      - 'web/index.html'

  pull_request:

  workflow_dispatch:
    inputs:
      workload:
        description: "Select which workload to run"
        required: true
        default: test.py
        type: choice
        options:
          - test.py
          - test2.py
          - test3.py

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  benchmark:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          ./setup.sh

      - name: Restore previous benchmark state
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: benchmark-state
          path: web

      - name: Run workload benchmark
        run: |
          export PATH="$GITHUB_WORKSPACE/.venv/bin:$PATH"

          WORKLOAD="${{ github.event.inputs.workload }}"
          WORKLOAD=${WORKLOAD:-test.py}

          ./run.sh \
            -m cpu,memory,thread,gpu \
            -it 5 -wit 3 \
            -cmp 10 \
            -rfmt json,md,csv \
            -vfmt table,chart,graph \
            ./workloads/$WORKLOAD

      - name: Save benchmark state
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-state
          path: web
          retention-days: 90

      - name: Verify Combined Pages Directory
        run: |
          ls -R web

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: benchmark
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4