# THreshold semantics:
# - direction                 : lower_better, higher_better, neutral
#                               lower_better  => lower values mean improvement
#                               higher_better => higher values mean improvement
#                               neutral       => doesn't directly affect performance
#
# - noise_floor_pct           : detects noise if abs(delta_pct) <= noise_floor_pct
#                               note: noise_floor_pct should be non-negative number
#
# - improvement_threshold_pct : detects improvement if delta_pct <= -improvement_threshold_pct (for lower_better)
#                               detects improvement if delta_pct >=  improvement_threshold_pct (for higher_better)
#                               note: improvement_threshold_pct should be non-negative number
#  
# - regression_threshold_pct  : detects regression if delta_pct >=  regression_threshold_pct (for lower_better)
#                               detects regression if delta_pct <= -regression_threshold_pct (for higher_better)
#                               note: improvement_threshold_pct should be non-negative number
#

thresholds:

  wall_time_ms:
    direction: lower_better
    noise_floor_pct: 5.0
    improvement_threshold_pct: 5.0
    regression_threshold_pct: 5.0


  ipc:
    direction: higher_better
    noise_floor_pct: 1.0
    improvement_threshold_pct: 2.0
    regression_threshold_pct: 2.0

